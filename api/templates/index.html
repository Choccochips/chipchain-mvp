<!DOCTYPE html>
<html>
<head>
    <title>ChipChain</title>
    <style>
        body {
            zoom: .9;
            background-color: #f7f4ef;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            margin: 0;
            color: #3f3f3f;
        }

        .header {
            background-color: #e8e1d6;
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid #d6cdc0;
        }

        .header h1 {
            margin: 0;
            font-weight: 600;
        }

        .header p {
            margin: 5px 0 0;
            color: #6e6e6e;
        }

        .container {
            max-width: 950px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .card {
            background: white;
            margin-bottom: 18px;
            border-radius: 14px;
            border: 1px solid #ece6dc;
            padding: 20px;
            transition: all 0.18s ease-out;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0px 10px 20px rgba(0,0,0,0.08);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn {
            background: white;
            color: #5f5a54;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid #e2d8ca;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease-out;
        }

        .btn:hover {
            background-color: #f4efe8;
        }

        .btn.primary {
            background-color: #d8d0c2;
            color: #3f3f3f;
        }

        input {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #e2d8ca;
            font-size: 14px;
            background: white;
            color: #3f3f3f;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 4px;
            display: block;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge.valid {
            background-color: #dcebd8;
            color: #446344;
        }

        .badge.invalid {
            background-color: #f0d9d5;
            color: #8a4f49;
        }

        .balance-display {
            font-size: 24px;
            font-weight: 600;
            margin: 10px 0;
        }

        .block-hash {
            font-family: monospace;
            font-size: 12px;
            color: #888;
            word-break: break-all;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #dcebd8;
            color: #446344;
        }

        .message.error {
            background-color: #f0d9d5;
            color: #8a4f49;
        }

        #chain-data .card {
            cursor: pointer;
        }

        /* wallet Bucket update*/
        .wallet-bucket {
            background: linear-gradient(145deg, #d8d0c2, #c9bfae);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 22px;
            border: 1px solid #b8ad9c;
            position: relative;
            overflow: hidden;
        }
        .wallet-bucket::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        .bucket-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6e6357;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .bucket-balance {
            font-size: 42px;
            font-weight: 700;
            color: #3f3a33;
            font-family: monospace;
        }
        .bucket-address {
            font-family: monospace;
            font-size: 11px;
            color: #8a8275;
            word-break: break-all;
            line-height: 1.5;
        }
        .wallet-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }

        /* Block Carousel */
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            padding: 10px 0 20px;
            -webkit-overflow-scrolling: touch;
        }
        .carousel-track::-webkit-scrollbar {
            height: 6px;
        }
        .carousel-track::-webkit-scrollbar-thumb {
            background: #d6cdc0;
            border-radius: 3px;
        }
        .carousel-track .card {
            min-width: 280px;
            max-width: 280px;
            scroll-snap-align: start;
            flex-shrink: 0;
            margin-bottom: 0;
        }

        /* Validation flash */
        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .badge.valid {
            background-color: #dcebd8;
            color: #446344;
        }
        .badge.invalid {
            background-color: #f0d9d5;
            color: #8a4f49;
        }
        .badge.flash {
            animation: flashPulse 0.4s ease;
        }
        @keyframes flashPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .btn.active-view {
            background-color: #3f3a33;
            color: #f7f4ef;
            border-color: #3f3a33;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>ChipChain</h1>
    </div>

    <div class="container">

        <div id="status-message" class="message"></div>

        <!-- Wallet Section -->
        <div class="section-title">Wallet</div>
        <div class="wallet-bucket">
            <div class="form-group">
                <label>Private Key</label>
                <input type="text" id="private-key" placeholder="Paste your private key hex">
            </div>
            <div class="bucket-label">Wallet Address</div>
            <div id="wallet-address" class="bucket-address">—</div>
            <div class="bucket-label" style="margin-top: 16px;">Balance</div>
            <div class="bucket-balance" id="balance">—</div>
            <div class="wallet-actions">
                <button class="btn" onclick="loadWallet()">Load Wallet</button>
                <button class="btn" onclick="checkBalance()">Check Balance</button>
            </div>
        </div>

        <!-- Send Transaction -->
        <div class="section-title">Send Transaction</div>
        <div class="card">
            <div class="form-group">
                <label>Recipient Address</label>
                <input type="text" id="recipient" placeholder="Recipient public key">
            </div>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="amount" placeholder="0">
            </div>
            <button class="btn primary" onclick="sendTransaction()">Send</button>
        </div>

        <!-- Mining & Validation -->
        <div class="actions">
            <button class="btn" onclick="mineBlock()">Mine Pending Transactions</button>
            <button class="btn view-btn" onclick="setActiveView(this); validateChain()">Validate Chain</button>
            <button class="btn view-btn" onclick="setActiveView(this); loadChain()">View Chain</button>
            <button class="btn view-btn" onclick="setActiveView(this); loadPending()">View Pending</button>
        </div>

        <div id="validation-result" style="margin-bottom: 20px;"></div>

        <!-- Chain Display -->
        <div id="chain-data"></div>

    </div>

    <script>
        let walletAddress = '';

        function showMessage(text, type) {
            const msg = document.getElementById('status-message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        function setActiveView(clicked) {
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active-view'));
            clicked.classList.add('active-view');
        }

        async function loadWallet() {
            const key = document.getElementById('private-key').value.trim();
            if (!key) return showMessage('Enter a private key', 'error');

            try {
                const res = await fetch('/wallet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ private_key: key })
                });
                const data = await res.json();
                walletAddress = data.address;
                document.getElementById('wallet-address').textContent = walletAddress;
                showMessage('Wallet loaded!', 'success');
                checkBalance();
            } catch (err) {
                showMessage('Failed to load wallet', 'error');
            }
        }

        async function checkBalance() {
            if (!walletAddress) return showMessage('Load a wallet first', 'error');

            const res = await fetch('/balance/' + walletAddress);
            const data = await res.json();
            document.getElementById('balance').textContent = data.balance;
        }

        async function sendTransaction() {
            const key = document.getElementById('private-key').value.trim();
            const recipient = document.getElementById('recipient').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);

            if (!key || !recipient || !amount) return showMessage('Fill in all fields', 'error');

            try {
                const res = await fetch('/transaction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ private_key: key, recipient: recipient, amount: amount })
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage(data.message, 'success');
                    loadPending();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (err) {
                showMessage('Transaction failed', 'error');
            }
        }

        async function mineBlock() {
            if (!walletAddress) return showMessage('Load a wallet first', 'error');

            showMessage('Mining...', 'success');
            const res = await fetch('/mine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: walletAddress })
            });
            const data = await res.json();
            showMessage(data.message, 'success');
            
            // auto-refresh
            checkBalance();
            loadChain();
        }

        async function validateChain() {
            const res = await fetch('/validate');
            const data = await res.json();
            const el = document.getElementById('validation-result');
            
            const badgeClass = data.valid ? 'valid' : 'invalid';
            const label = data.valid ? 'Chain is valid' : 'Chain is invalid!';
            
            el.innerHTML = `<span class="badge ${badgeClass}" id="validate-badge">${label}</span>`;
            
            // flash animation on every click
            const badge = document.getElementById('validate-badge');
            badge.classList.remove('flash');
            void badge.offsetWidth; // force reflow
            badge.classList.add('flash');
        }

        async function loadChain() {
            const res = await fetch('/chain');
            const chain = await res.json();
            let html = '<div class="section-title">Blockchain (' + chain.length + ' blocks)</div>';
            html += '<div class="carousel-wrapper"><div class="carousel-track">';

            chain.forEach((block, i) => {
                html += `
                    <div class="card">
                        <strong>Block ${i}</strong>
                        <div class="block-hash" style="margin-top: 8px;">Hash: ${block.hash.substring(0, 20)}...</div>
                        <div class="block-hash">Prev: ${block.prev_hash.substring(0, 20)}...</div>
                        <div style="margin-top: 8px; font-size: 14px;">
                            Txns: ${block.transactions.length} | Nonce: ${block.nonce}
                        </div>
                    </div>
                `;
            });

            html += '</div></div>';
            document.getElementById('chain-data').innerHTML = html;
        }

        async function loadPending() {
            const res = await fetch('/pending');
            const pending = await res.json();
            let html = '<div class="section-title">Pending Transactions (' + pending.length + ')</div>';

            if (pending.length === 0) {
                html += '<div class="card">No pending transactions</div>';
            } else {
                html += '<div class="carousel-wrapper"><div class="carousel-track">';
                pending.forEach(tx => {
                    html += `
                        <div class="card">
                            <div class="block-hash">From: ${tx.sender_address || 'System (Mining Reward)'}</div>
                            <div class="block-hash">To: ${tx.recip_address}</div>
                            <div style="margin-top: 8px; font-weight: 600;">Amount: ${tx.amount}</div>
                        </div>
                    `;
                });
                html += '</div></div>';
            }

            document.getElementById('chain-data').innerHTML = html;
        }
    </script>

</body>
</html>
